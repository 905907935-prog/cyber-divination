// 完整应用逻辑 - 5步流程
class App {
    constructor() {
        this.step = 1;
        this.userInfo = {};
        this.minChars = 10;
        this.init();
    }
    
    init() {
        // 步骤1: 梦境输入
        const dreamInput = document.getElementById('userInput');
        const charCount = document.getElementById('charCount');
        const nextBtn1 = document.getElementById('nextBtn1');
        const hint1 = document.getElementById('btnHint1');
        
        dreamInput.addEventListener('input', () => {
            const length = dreamInput.value.length;
            charCount.textContent = length;
            
            if (length >= this.minChars) {
                nextBtn1.disabled = false;
                nextBtn1.classList.add('active');
                hint1.textContent = '✧ 准备就绪，继续吧 ✧';
                hint1.className = 'btn-hint ready';
            } else {
                nextBtn1.disabled = true;
                nextBtn1.classList.remove('active');
                const remaining = this.minChars - length;
                hint1.textContent = `✧ 还需 ${remaining} 个字即可继续 ✧`;
                hint1.className = 'btn-hint disabled';
            }
        });
        
        nextBtn1.addEventListener('click', () => {
            this.userInfo.dream = dreamInput.value.trim();
            this.goToStep(2);
        });
        
        // 步骤2: 个人信息
        document.getElementById('nextBtn2').addEventListener('click', () => {
            this.userInfo.ageRange = document.getElementById('ageRange').value;
            this.userInfo.lifeStatus = document.getElementById('lifeStatus').value;
            this.userInfo.concernArea = document.getElementById('concernArea').value;
            this.userInfo.mood = document.getElementById('mood').value;
            this.goToStep(3);
            this.startCountdown();
        });
        
        // 步骤4: 塔罗牌选择
        document.querySelectorAll('.tarot-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.tarot-card').forEach(c => c.classList.add('flipped'));
                
                setTimeout(() => {
                    document.querySelectorAll('.tarot-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    this.userInfo.tarotCard = card.dataset.card;
                    const nextBtn4 = document.getElementById('nextBtn4');
                    const hint4 = document.getElementById('btnHint4');
                    nextBtn4.disabled = false;
                    nextBtn4.classList.add('active');
                    hint4.textContent = '✧ 准备就绪，继续吧 ✧';
                    hint4.className = 'btn-hint ready';
                }, 600);
            });
        });
        
        document.getElementById('nextBtn4').addEventListener('click', () => {
            this.goToStep(5);
        });
        
        // 步骤5: 验证兑换码
        document.getElementById('verifyBtn').addEventListener('click', () => this.verify());
        
        // 重置
        document.getElementById('resetBtn').addEventListener('click', () => location.reload());
    }
    
    goToStep(step) {
        document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step${step}`).classList.add('active');
        
        document.querySelectorAll('.step-dot').forEach((dot, i) => {
            dot.classList.toggle('active', i < step);
        });
        
        this.step = step;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    startCountdown() {
        let count = 10;
        const countdown = document.getElementById('countdown');
        countdown.textContent = count;
        const timer = setInterval(() => {
            count--;
            countdown.textContent = count;
            if (count <= 0) {
                clearInterval(timer);
                this.goToStep(4);
            }
        }, 1000);
    }
    
    verify() {
        const code = document.getElementById('redeemCode').value.trim().toUpperCase();
        const errorMsg = document.getElementById('errorMessage');
        
        if (!code) {
            errorMsg.textContent = '请输入兑换码';
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 3000);
            return;
        }
        
        // 验证兑换码 - 支持测试码和XHS格式码
        const validTestCodes = ['TEST2024', 'DEMO9999', 'FREE1234'];
        const isXHSFormat = /^XHS[A-Z0-9]-[A-Z0-9]{4}$/.test(code);
        const isValid = validTestCodes.includes(code) || isXHSFormat;
        
        if (isValid) {
            this.showResult();
        } else {
            errorMsg.textContent = '兑换码无效或已使用，请检查后重试';
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 3000);
        }
    }
    
    showResult() {
        document.querySelector('.card').style.display = 'none';
        const resultSection = document.getElementById('resultSection');
        resultSection.classList.remove('hidden');
        
        // 生成结果
        const result = this.generateResult();
        document.getElementById('resultSubtitle').textContent = result.subtitle;
        document.getElementById('imagery').textContent = result.imagery;
        document.getElementById('mapping').textContent = result.mapping;
        document.getElementById('guidance').textContent = result.guidance;
        
        setTimeout(() => {
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }, 100);
    }
    
    generateResult() {
        const subtitle = this.generateSubtitle();
        const imagery = this.generateImagery();
        const mapping = this.generateMapping();
        const guidance = this.generateGuidance();
        
        return { subtitle, imagery, mapping, guidance };
    }
    
    generateSubtitle() {
        const parts = [];
        if (this.userInfo.ageRange) parts.push(this.userInfo.ageRange);
        if (this.userInfo.lifeStatus) parts.push(this.userInfo.lifeStatus);
        if (this.userInfo.concernArea) parts.push(`关注${this.userInfo.concernArea}`);
        return parts.length > 0 ? parts.join(' · ') : '为你解析';
    }
    
    generateImagery() {
        const base = [
            "在命运的星图中，我看到了一颗紫色的星辰正在缓缓升起。",
            "梦境的意象如同水面的涟漪，层层扩散。",
            "在荣格的集体无意识海洋中，你的梦境呈现出蝴蝶破茧的原型意象。"
        ];
        const tarot = {
            "1": "月亮牌显示，你正处于直觉觉醒的阶段。潜意识中有些东西正在浮现，不要忽视那些看似不合逻辑的感受。",
            "2": "星星牌昭示，希望之光即将照亮你的道路。你所期待的转机，会在你坚持到最后一刻时出现。",
            "3": "太阳牌预示，光明与活力正在向你涌来。是时候走出阴影，让世界看到真实的你。"
        };
        let text = base[Math.floor(Math.random() * base.length)];
        if (this.userInfo.tarotCard && tarot[this.userInfo.tarotCard]) {
            text += " " + tarot[this.userInfo.tarotCard];
        }
        return text;
    }
    
    generateMapping() {
        let text = "从心理学的视角来看，这个梦境映射了你潜意识中的深层思考。";
        
        const moodMapping = {
            "焦虑不安": "你的焦虑源于对未知的恐惧。但我看到，这恰恰是突破的前兆。焦虑说明你在乎，在乎就有动力改变。",
            "迷茫困惑": "迷茫是灵魂在重新校准方向。你不是失去了目标，而是旧的目标已经不再适合现在的你。",
            "平静安宁": "你的平静来自内在的智慧觉醒。这份平静不是逃避，而是你已经学会了与不确定性共处。",
            "兴奋期待": "你的期待蕴含着创造的能量。但要小心，过度的期待可能变成压力。享受过程，而非只盯着结果。",
            "低落沮丧": "低落是灵魂在蓄积力量。就像种子在土壤中沉默，是为了破土而出。",
            "充满希望": "你的希望是宇宙的回应。当你真心渴望某件事时，整个宇宙都会联合起来帮助你。"
        };
        
        if (this.userInfo.mood && moodMapping[this.userInfo.mood]) {
            text += " " + moodMapping[this.userInfo.mood];
        }
        
        return text;
    }
    
    generateGuidance() {
        // 根据关注领域和生活状态选择指引
        if (this.userInfo.concernArea === "事业发展" && this.userInfo.lifeStatus) {
            const careerGuidance = guidanceTemplates.career[this.userInfo.lifeStatus];
            if (careerGuidance && careerGuidance.length > 0) {
                return careerGuidance[Math.floor(Math.random() * careerGuidance.length)];
            }
        } else if (this.userInfo.concernArea === "感情关系") {
            return guidanceTemplates.relationship[Math.floor(Math.random() * guidanceTemplates.relationship.length)];
        } else if (this.userInfo.concernArea === "健康养生") {
            return guidanceTemplates.health[Math.floor(Math.random() * guidanceTemplates.health.length)];
        } else if (this.userInfo.concernArea === "财富积累") {
            return guidanceTemplates.wealth[Math.floor(Math.random() * guidanceTemplates.wealth.length)];
        } else if (this.userInfo.concernArea === "个人成长") {
            return guidanceTemplates.growth[Math.floor(Math.random() * guidanceTemplates.growth.length)];
        } else if (this.userInfo.concernArea === "家庭和谐") {
            return guidanceTemplates.family[Math.floor(Math.random() * guidanceTemplates.family.length)];
        }
        
        // 默认通用指引
        return guidanceTemplates.general[Math.floor(Math.random() * guidanceTemplates.general.length)];
    }
}

// 启动应用
document.addEventListener('DOMContentLoaded', () => {
    new App();
});
</script>
