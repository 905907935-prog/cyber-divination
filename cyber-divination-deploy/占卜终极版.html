<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✧ 赛博神谕 · 梦境解析 ✧</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; overflow-x: hidden; min-height: 100vh; background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); color: #e0e0e0; position: relative; }
#starsCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
.container { position: relative; z-index: 1; max-width: 650px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
.header { text-align: center; margin: 40px 0 30px; animation: fadeInDown 1s ease-out; }
.title { font-size: 2.5rem; font-weight: 300; letter-spacing: 8px; color: #d4af37; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); margin-bottom: 10px; }
.subtitle { font-size: 1rem; letter-spacing: 4px; color: #b8b8d1; opacity: 0.9; }
.card { width: 100%; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px 30px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); animation: fadeInUp 1s ease-out; }
.crystal-ball { width: 200px; height: 200px; margin: 0 auto 40px; position: relative; perspective: 1000px; }
.ball-inner { width: 100%; height: 100%; position: relative; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(147, 112, 219, 0.8) 0%, rgba(138, 43, 226, 0.6) 40%, rgba(75, 0, 130, 0.4) 100%); box-shadow: inset -25px -25px 40px rgba(0, 0, 0, 0.5), inset 25px 25px 40px rgba(255, 255, 255, 0.1), 0 0 60px rgba(147, 112, 219, 0.6); animation: breathe 4s ease-in-out infinite; transform-style: preserve-3d; }
.ball-shine { position: absolute; top: 20%; left: 25%; width: 60px; height: 60px; background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%); border-radius: 50%; filter: blur(10px); animation: shimmer 3s ease-in-out infinite; }
.ball-glow { position: absolute; inset: -20px; border-radius: 50%; background: radial-gradient(circle, rgba(147, 112, 219, 0.4) 0%, transparent 70%); filter: blur(20px); animation: pulse 4s ease-in-out infinite; }
.ball-shadow { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); width: 150px; height: 20px; background: radial-gradient(ellipse, rgba(0, 0, 0, 0.5) 0%, transparent 70%); filter: blur(10px); }
.step-indicator { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
.step-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(212, 175, 55, 0.3); transition: all 0.3s ease; position: relative; }
.step-dot.active { background: rgba(212, 175, 55, 0.9); box-shadow: 0 0 15px rgba(212, 175, 55, 0.6); transform: scale(1.3); }
.step-dot::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 6px; height: 6px; border-radius: 50%; background: rgba(255, 255, 255, 0.8); opacity: 0; transition: opacity 0.3s; }
.step-dot.active::after { opacity: 1; }
.form-step { display: none; }
.form-step.active { display: block; animation: fadeInUp 0.5s ease-out; }
.section-title { font-size: 1.1rem; color: #d4af37; margin-bottom: 20px; letter-spacing: 2px; text-align: center; }
.input-section { margin-bottom: 25px; }
.input-label { display: block; font-size: 1rem; color: #d4af37; margin-bottom: 15px; letter-spacing: 2px; text-align: center; }
.dream-input { width: 100%; min-height: 150px; padding: 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px; color: #e0e0e0; font-size: 0.95rem; line-height: 1.6; resize: vertical; font-family: inherit; transition: all 0.3s ease; }
.dream-input:focus { outline: none; border-color: rgba(212, 175, 55, 0.6); background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
.dream-input::placeholder { color: rgba(224, 224, 224, 0.4); }
.char-count { text-align: right; font-size: 0.85rem; color: rgba(224, 224, 224, 0.5); margin-top: 8px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
.form-group { margin-bottom: 15px; }
.form-label { display: block; font-size: 0.9rem; color: #b8b8d1; margin-bottom: 8px; letter-spacing: 1px; }
.form-input, .form-select { width: 100%; padding: 12px 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 10px; color: #e0e0e0; font-size: 0.95rem; font-family: inherit; transition: all 0.3s ease; }
.form-input:focus, .form-select:focus { outline: none; border-color: rgba(212, 175, 55, 0.6); background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
.form-select { cursor: pointer; }
.form-select option { background: #24243e; color: #e0e0e0; }
.tarot-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; perspective: 1000px; }
.tarot-card { aspect-ratio: 2/3; position: relative; cursor: pointer; transform-style: preserve-3d; transition: transform 0.6s; }
.tarot-card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s; }
.tarot-card.flipped .tarot-card-inner { transform: rotateY(180deg); }
.tarot-card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
.tarot-card-front { background: linear-gradient(135deg, rgba(75, 0, 130, 0.6), rgba(138, 43, 226, 0.6)); border: 2px solid rgba(212, 175, 55, 0.4); }
.tarot-card-back { background: linear-gradient(135deg, rgba(147, 112, 219, 0.3), rgba(138, 43, 226, 0.3)); border: 2px solid rgba(212, 175, 55, 0.4); transform: rotateY(180deg); }
.tarot-card:hover { transform: translateY(-10px) scale(1.05); }
.tarot-card.selected .tarot-card-back { border-color: #d4af37; background: linear-gradient(135deg, rgba(212, 175, 55, 0.4), rgba(184, 134, 11, 0.4)); box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); }
.audio-control { position: fixed; top: 20px; right: 20px; z-index: 1000; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; }
.audio-control:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(212, 175, 55, 0.6); transform: scale(1.1); }
.audio-control.muted { opacity: 0.5; }
.countdown { text-align: center; font-size: 3rem; color: #d4af37; margin: 40px 0; text-shadow: 0 0 20px rgba(212, 175, 55, 0.6); animation: pulse-text 1s ease-in-out infinite; }
.meditation-text { text-align: center; font-size: 1.1rem; color: #b8b8d1; line-height: 1.8; margin: 20px 0; letter-spacing: 2px; }
.btn-wrapper { position: relative; margin-top: 20px; }
.submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, rgba(212, 175, 55, 0.3), rgba(184, 134, 11, 0.3)); border: 2px solid rgba(212, 175, 55, 0.5); border-radius: 15px; color: #d4af37; font-size: 1.1rem; font-weight: 500; letter-spacing: 4px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.submit-btn:not(:disabled):hover { background: linear-gradient(135deg, rgba(212, 175, 55, 0.5), rgba(184, 134, 11, 0.5)); transform: translateY(-2px); box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3); }
.submit-btn.active { animation: goldenGlow 1.5s ease-in-out infinite; box-shadow: 0 0 30px rgba(212, 175, 55, 0.8), 0 0 60px rgba(212, 175, 55, 0.4); }
.btn-text { position: relative; z-index: 1; }
.btn-icon { margin-left: 10px; display: inline-block; animation: rotate 3s linear infinite; }
.btn-hint { text-align: center; margin-top: 12px; font-size: 0.9rem; letter-spacing: 2px; transition: all 0.3s ease; min-height: 24px; }
.btn-hint.disabled { color: rgba(212, 175, 55, 0.6); }
.btn-hint.ready { color: rgba(212, 175, 55, 0.9); animation: pulse-text 2s ease-in-out infinite; }
.result-section { width: 100%; margin-top: 30px; animation: fadeInUp 0.8s ease-out; }
.result-section.hidden { display: none; }
.result-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px 30px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
.result-header h2 { text-align: center; font-size: 1.8rem; font-weight: 300; letter-spacing: 6px; color: #d4af37; margin-bottom: 10px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
.result-subtitle { text-align: center; font-size: 0.95rem; color: #b8b8d1; margin-bottom: 30px; letter-spacing: 2px; }
.section { margin-bottom: 30px; }
.section-title-result { font-size: 1.2rem; font-weight: 400; letter-spacing: 3px; color: #b8b8d1; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
.section-content { font-size: 1rem; line-height: 1.8; color: #e0e0e0; padding: 15px; background: rgba(255, 255, 255, 0.02); border-radius: 10px; white-space: pre-wrap; }
.reset-btn { width: 100%; padding: 15px; background: rgba(147, 112, 219, 0.2); border: 1px solid rgba(147, 112, 219, 0.5); border-radius: 15px; color: #b8b8d1; font-size: 1rem; letter-spacing: 3px; cursor: pointer; transition: all 0.3s ease; margin-top: 20px; }
.reset-btn:hover { background: rgba(147, 112, 219, 0.3); transform: translateY(-2px); }
.footer { margin-top: auto; padding: 30px 0; text-align: center; color: rgba(224, 224, 224, 0.5); font-size: 0.9rem; letter-spacing: 2px; }
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: inset -25px -25px 40px rgba(0, 0, 0, 0.5), inset 25px 25px 40px rgba(255, 255, 255, 0.1), 0 0 60px rgba(147, 112, 219, 0.6); } 50% { transform: scale(1.05); box-shadow: inset -25px -25px 40px rgba(0, 0, 0, 0.5), inset 25px 25px 40px rgba(255, 255, 255, 0.1), 0 0 80px rgba(147, 112, 219, 0.8); } }
@keyframes shimmer { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
@keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.1); } }
@keyframes goldenGlow { 0%, 100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.6), 0 0 40px rgba(212, 175, 55, 0.3); } 50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.9), 0 0 80px rgba(212, 175, 55, 0.5); } }
@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes pulse-text { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
@media (max-width: 768px) { .title { font-size: 2rem; letter-spacing: 6px; } .subtitle { font-size: 0.9rem; letter-spacing: 3px; } .card { padding: 30px 20px; } .crystal-ball { width: 150px; height: 150px; } .result-card { padding: 30px 20px; } .form-row { grid-template-columns: 1fr; } .tarot-cards { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
</style>
</head>

<script>
// 音效管理器
class SoundManager {
    constructor() {
        this.enabled = true;
        this.sounds = {};
        this.initSounds();
    }
    
    initSounds() {
        // 使用 Web Audio API 生成音效
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    playClick() {
        if (!this.enabled) return;
        const oscillator = this.audioContext.createOscillator();
        const gainNode = this.audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(this.audioContext.destination);
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
        oscillator.start(this.audioContext.currentTime);
        oscillator.stop(this.audioContext.currentTime + 0.1);
    }
    
    playFlip() {
        if (!this.enabled) return;
        const oscillator = this.audioContext.createOscillator();
        const gainNode = this.audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(this.audioContext.destination);
        oscillator.frequency.setValueAtTime(400, this.audioContext.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(800, this.audioContext.currentTime + 0.2);
        oscillator.type = 'triangle';
        gainNode.gain.setValueAtTime(0.15, this.audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.2);
        oscillator.start(this.audioContext.currentTime);
        oscillator.stop(this.audioContext.currentTime + 0.2);
    }
    
    playSuccess() {
        if (!this.enabled) return;
        const oscillator = this.audioContext.createOscillator();
        const gainNode = this.audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(this.audioContext.destination);
        oscillator.frequency.setValueAtTime(523.25, this.audioContext.currentTime);
        oscillator.frequency.setValueAtTime(659.25, this.audioContext.currentTime + 0.1);
        oscillator.frequency.setValueAtTime(783.99, this.audioContext.currentTime + 0.2);
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.3);
        oscillator.start(this.audioContext.currentTime);
        oscillator.stop(this.audioContext.currentTime + 0.3);
    }
    
    playMagic() {
        if (!this.enabled) return;
        const oscillator = this.audioContext.createOscillator();
        const gainNode = this.audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(this.audioContext.destination);
        oscillator.frequency.setValueAtTime(1000, this.audioContext.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(2000, this.audioContext.currentTime + 0.5);
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.5);
        oscillator.start(this.audioContext.currentTime);
        oscillator.stop(this.audioContext.currentTime + 0.5);
    }
    
    toggle() {
        this.enabled = !this.enabled;
        return this.enabled;
    }
}

// 打字机效果
class TypeWriter {
    constructor(element, speed = 30) {
        this.element = element;
        this.speed = speed;
        this.isTyping = false;
    }
    
    async type(text) {
        this.isTyping = true;
        this.element.textContent = '';
        const chars = text.split('');
        
        for (let i = 0; i < chars.length; i++) {
            if (!this.isTyping) break;
            this.element.textContent += chars[i];
            await this.delay(this.speed);
        }
        
        this.isTyping = false;
    }
    
    stop() {
        this.isTyping = false;
    }
    
    delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
}

// 流星效果
class ShootingStars {
    constructor() {
        this.canvas = document.getElementById('starsCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.stars = [];
        this.shootingStars = [];
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.init();
        this.animate();
    }
    
    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }
    
    init() {
        for (let i = 0; i < 100; i++) {
            this.stars.push({
                x: Math.random() * this.canvas.width,
                y: Math.random() * this.canvas.height,
                size: Math.random() * 2,
                opacity: Math.random() * 0.5 + 0.3,
                twinkleSpeed: Math.random() * 0.02 + 0.01
            });
        }
    }
    
    createShootingStar() {
        if (Math.random() < 0.01) {
            this.shootingStars.push({
                x: Math.random() * this.canvas.width,
                y: Math.random() * this.canvas.height * 0.5,
                length: Math.random() * 80 + 40,
                speed: Math.random() * 3 + 2,
                opacity: 1,
                angle: Math.PI / 4
            });
        }
    }
    
    drawStars() {
        this.stars.forEach(star => {
            this.ctx.beginPath();
            this.ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            this.ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
            this.ctx.fill();
            star.opacity += star.twinkleSpeed;
            if (star.opacity > 0.8 || star.opacity < 0.3) {
                star.twinkleSpeed *= -1;
            }
        });
    }
    
    drawShootingStars() {
        this.shootingStars = this.shootingStars.filter(star => {
            const gradient = this.ctx.createLinearGradient(
                star.x, star.y,
                star.x + Math.cos(star.angle) * star.length,
                star.y + Math.sin(star.angle) * star.length
            );
            gradient.addColorStop(0, `rgba(255, 255, 255, ${star.opacity})`);
            gradient.addColorStop(0.5, `rgba(147, 112, 219, ${star.opacity * 0.6})`);
            gradient.addColorStop(1, 'rgba(147, 112, 219, 0)');
            this.ctx.beginPath();
            this.ctx.strokeStyle = gradient;
            this.ctx.lineWidth = 2;
            this.ctx.moveTo(star.x, star.y);
            this.ctx.lineTo(
                star.x + Math.cos(star.angle) * star.length,
                star.y + Math.sin(star.angle) * star.length
            );
            this.ctx.stroke();
            star.x += Math.cos(star.angle) * star.speed;
            star.y += Math.sin(star.angle) * star.speed;
            star.opacity -= 0.01;
            return star.opacity > 0 && star.x < this.canvas.width && star.y < this.canvas.height;
        });
    }
    
    animate() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.drawStars();
        this.createShootingStar();
        this.drawShootingStars();
        requestAnimationFrame(() => this.animate());
    }
}

    async analyze(userInput, userInfo) {
        await this.delay(2000);
        
        const imagery = this.generateImagery(userInfo);
        const mapping = this.generateMapping(userInfo);
        const guidance = this.generateGuidance(userInfo);
        
        return {
            imagery: this.enrichText(imagery),
            mapping: this.enrichText(mapping),
            guidance: this.enrichText(guidance),
            subtitle: this.generateSubtitle(userInfo)
        };
    }
    
    generateImagery(userInfo) {
        let text = this.getRandomTemplate(this.templates.imagery.base);
        if (userInfo.tarotCard) {
            text += " " + this.templates.imagery.tarot[userInfo.tarotCard];
        }
        return text;
    }
    
    generateMapping(userInfo) {
        let text = this.getRandomTemplate(this.templates.mapping.base);
        
        // 根据心境添加具体分析
        if (userInfo.mood && this.templates.mapping.mood[userInfo.mood]) {
            text += " " + this.templates.mapping.mood[userInfo.mood];
        }
        
        // 根据年龄段添加人生阶段分析
        if (userInfo.ageRange && this.templates.mapping.ageRange[userInfo.ageRange]) {
            text += " " + this.templates.mapping.ageRange[userInfo.ageRange];
        }
        
        return text;
    }
    
    generateGuidance(userInfo) {
        let guidance = "";
        
        // 调试信息（生产环境可删除）
        console.log('用户信息:', {
            concernArea: userInfo.concernArea,
            lifeStatus: userInfo.lifeStatus,
            mood: userInfo.mood,
            ageRange: userInfo.ageRange
        });
        
        // 根据关注领域和生活状态给出具体指引
        if (userInfo.concernArea === "事业发展" && userInfo.lifeStatus) {
            const careerGuidance = this.templates.guidance.career[userInfo.lifeStatus];
            if (careerGuidance && Array.isArray(careerGuidance)) {
                guidance = this.getRandomTemplate(careerGuidance);
                console.log(`选择了事业发展-${userInfo.lifeStatus}模板，共${careerGuidance.length}个选项`);
            }
        } else if (userInfo.concernArea === "感情关系") {
            guidance = this.getRandomTemplate(this.templates.guidance.relationship);
            console.log(`选择了感情关系模板，共${this.templates.guidance.relationship.length}个选项`);
        } else if (userInfo.concernArea === "健康养生") {
            guidance = this.getRandomTemplate(this.templates.guidance.health);
            console.log(`选择了健康养生模板，共${this.templates.guidance.health.length}个选项`);
        } else if (userInfo.concernArea === "财富积累") {
            guidance = this.getRandomTemplate(this.templates.guidance.wealth);
            console.log(`选择了财富积累模板，共${this.templates.guidance.wealth.length}个选项`);
        } else if (userInfo.concernArea === "个人成长") {
            guidance = this.getRandomTemplate(this.templates.guidance.growth);
            console.log(`选择了个人成长模板，共${this.templates.guidance.growth.length}个选项`);
        } else if (userInfo.concernArea === "家庭和谐") {
            guidance = this.getRandomTemplate(this.templates.guidance.family);
            console.log(`选择了家庭和谐模板，共${this.templates.guidance.family.length}个选项`);
        }
        
        // 如果没有匹配到具体指引，给通用建议（多个版本随机）
        if (!guidance) {
            const generalGuidance = [
                "✧ 神谕的指引是：$*$顺应而非对抗$*$。\n\n本周行动：\n· 每天早晨冥想5分钟，倾听内心\n· 记录你的梦境和直觉\n· 做一件让未来的自己感激的事\n· 保持觉知，活在当下\n· 相信过程，一切都是最好的安排",
                "🔮 命运之轮正在转动，方向盘在你手中。\n\n这个月开始：\n· 写下你最想实现的3个目标\n· 每天进步1%，一年后你会惊讶于自己的改变\n· 远离负能量的人和事\n· 培养一个让你快乐的爱好\n· 记住：改变从当下开始",
                "☾ 月亮的智慧告诉我们：$*$黑暗并非终点，而是孕育光明的子宫$*$。\n\n接下来的日子：\n· 接纳当下的不完美\n· 每周至少一次深度思考\n· 向你尊敬的人学习\n· 保持感恩的心态\n· 相信：你正走在正确的路上",
                "✧ 宇宙的讯息是：$*$你比自己想象的更强大$*$。\n\n立即行动：\n· 列出你的3个优势和1个需要改进的地方\n· 每天做一件让你害怕的小事\n· 建立支持你的社交圈\n· 学会说不，保护你的能量\n· 记住：你值得拥有美好的生活",
                "🌟 星辰的启示：$*$每个结束都是新的开始$*$。\n\n当下行动：\n· 放下过去的遗憾，专注当下\n· 每天写下3件感恩的事\n· 尝试一件从未做过的事\n· 相信直觉，它比理性更懂你\n· 记住：生命是一场体验，不是考试"
            ];
            guidance = this.getRandomTemplate(generalGuidance);
            console.log(`使用通用模板，共${generalGuidance.length}个选项`);
        }
        
        return guidance;
    }
    
    generateSubtitle(userInfo) {
        const parts = [];
        if (userInfo.ageRange) parts.push(userInfo.ageRange);
        if (userInfo.lifeStatus) parts.push(userInfo.lifeStatus);
        if (userInfo.concernArea) parts.push(`关注${userInfo.concernArea}`);
        return parts.length > 0 ? parts.join(' · ') : '为你解析';
    }
    
    getRandomTemplate(templates) {
        if (Array.isArray(templates)) {
            // 使用时间戳作为种子，确保每次访问都有不同的随机结果
            const seed = Date.now() + Math.random();
            const index = Math.floor((seed % templates.length));
            return templates[index];
        }
        return templates;
    }
    
    enrichText(text) {
        return text.replace(/\$\*\$/g, (match, offset) => {
            return offset % 2 === 0 ? '✧ ' : ' ✧';
        });
    }
    
    delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
}

// 主应用逻辑
class DivinationApp {
    constructor() {
        this.currentStep = 1;
        this.userInfo = {};
        this.ai = new DivinationAI();
        this.soundManager = new SoundManager();
        this.minChars = 10;
        this.initElements();
        this.initEventListeners();
        this.initAudioControl();
    }
    
    initElements() {
        this.userInput = document.getElementById('userInput');
        this.charCount = document.getElementById('charCount');
        this.nextBtn1 = document.getElementById('nextBtn1');
        this.nextBtn2 = document.getElementById('nextBtn2');
        this.submitBtn = document.getElementById('submitBtn');
        this.resetBtn = document.getElementById('resetBtn');
        this.btnHint1 = document.getElementById('btnHint1');
        this.btnHint4 = document.getElementById('btnHint4');
        this.countdown = document.getElementById('countdown');
        this.resultSection = document.getElementById('resultSection');
        this.resultSubtitle = document.getElementById('resultSubtitle');
        this.imageryEl = document.getElementById('imagery');
        this.mappingEl = document.getElementById('mapping');
        this.guidanceEl = document.getElementById('guidance');
        this.audioControl = document.getElementById('audioControl');
        this.audioIcon = document.getElementById('audioIcon');
    }
    
    initAudioControl() {
        this.audioControl.addEventListener('click', () => {
            const enabled = this.soundManager.toggle();
            this.audioIcon.textContent = enabled ? '🔊' : '🔇';
            this.audioControl.classList.toggle('muted', !enabled);
            this.soundManager.playClick();
        });
    }
    
    initEventListeners() {
        // 步骤1: 梦境输入
        this.userInput.addEventListener('input', () => {
            const length = this.userInput.value.length;
            this.charCount.textContent = length;
            if (length >= this.minChars) {
                this.nextBtn1.disabled = false;
                this.nextBtn1.classList.add('active');
                this.btnHint1.textContent = '✧ 准备就绪，继续吧 ✧';
                this.btnHint1.className = 'btn-hint ready';
            } else {
                this.nextBtn1.disabled = true;
                this.nextBtn1.classList.remove('active');
                const remaining = this.minChars - length;
                this.btnHint1.textContent = `✧ 还需 ${remaining} 个字即可继续 ✧`;
                this.btnHint1.className = 'btn-hint disabled';
            }
        });
        
        this.nextBtn1.addEventListener('click', () => {
            this.soundManager.playClick();
            this.userInfo.dream = this.userInput.value.trim();
            this.goToStep(2);
        });
        
        // 步骤2: 个人信息
        this.nextBtn2.addEventListener('click', () => {
            this.soundManager.playClick();
            this.userInfo.ageRange = document.getElementById('ageRange').value;
            this.userInfo.lifeStatus = document.getElementById('lifeStatus').value;
            this.userInfo.concernArea = document.getElementById('concernArea').value;
            this.userInfo.mood = document.getElementById('mood').value;
            this.goToStep(3);
            this.startCountdown();
        });
        
        // 步骤4: 塔罗牌选择（带翻转效果）
        document.querySelectorAll('.tarot-card').forEach(card => {
            card.addEventListener('click', () => {
                // 翻转所有卡片
                document.querySelectorAll('.tarot-card').forEach(c => {
                    c.classList.add('flipped');
                });
                
                this.soundManager.playFlip();
                
                setTimeout(() => {
                    // 选中当前卡片
                    document.querySelectorAll('.tarot-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    this.userInfo.tarotCard = card.dataset.card;
                    this.submitBtn.disabled = false;
                    this.submitBtn.classList.add('active');
                    this.btnHint4.textContent = '✧ 准备就绪，触碰命运吧 ✧';
                    this.btnHint4.className = 'btn-hint ready';
                    this.soundManager.playSuccess();
                }, 600);
            });
        });
        
        this.submitBtn.addEventListener('click', () => this.handleSubmit());
        this.resetBtn.addEventListener('click', () => this.reset());
    }
    
    goToStep(step) {
        this.soundManager.playMagic();
        document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step${step}`).classList.add('active');
        document.querySelectorAll('.step-dot').forEach((dot, index) => {
            if (index < step) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
        this.currentStep = step;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    startCountdown() {
        let count = 10;
        this.countdown.textContent = count;
        const timer = setInterval(() => {
            count--;
            this.countdown.textContent = count;
            this.soundManager.playClick();
            if (count <= 0) {
                clearInterval(timer);
                this.goToStep(4);
            }
        }, 1000);
    }
    
    async handleSubmit() {
        this.submitBtn.disabled = true;
        this.submitBtn.classList.remove('active');
        this.submitBtn.innerHTML = '<span class="btn-text">神谕降临中...</span><span class="btn-icon">✧</span>';
        this.soundManager.playMagic();
        
        try {
            const result = await this.ai.analyze(this.userInfo.dream, this.userInfo);
            this.displayResult(result);
        } catch (error) {
            console.error('占卜失败:', error);
            alert('神谕暂时无法降临，请稍后再试 ✧');
            this.reset();
        }
    }
    
    async displayResult(result) {
        this.resultSubtitle.textContent = result.subtitle;
        
        // 使用打字机效果显示结果
        const typeWriter1 = new TypeWriter(this.imageryEl, 30);
        const typeWriter2 = new TypeWriter(this.mappingEl, 30);
        const typeWriter3 = new TypeWriter(this.guidanceEl, 30);
        
        document.querySelector('.card').style.display = 'none';
        this.resultSection.classList.remove('hidden');
        
        setTimeout(() => {
            this.resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
        
        this.soundManager.playSuccess();
        
        // 依次显示三段内容
        await typeWriter1.type(result.imagery);
        await new Promise(resolve => setTimeout(resolve, 500));
        await typeWriter2.type(result.mapping);
        await new Promise(resolve => setTimeout(resolve, 500));
        await typeWriter3.type(result.guidance);
    }
    
    reset() {
        this.soundManager.playClick();
        this.currentStep = 1;
        this.userInfo = {};
        this.userInput.value = '';
        this.charCount.textContent = '0';
        this.nextBtn1.disabled = true;
        this.nextBtn1.classList.remove('active');
        this.btnHint1.textContent = '✧ 请至少输入 10 个字 ✧';
        this.btnHint1.className = 'btn-hint disabled';
        this.submitBtn.disabled = true;
        this.submitBtn.classList.remove('active');
        this.submitBtn.innerHTML = '<span class="btn-text">触碰命运</span><span class="btn-icon">✧</span>';
        this.btnHint4.textContent = '✧ 请选择一张牌 ✧';
        this.btnHint4.className = 'btn-hint disabled';
        document.querySelectorAll('.tarot-card').forEach(c => {
            c.classList.remove('selected');
            c.classList.remove('flipped');
        });
        document.querySelectorAll('select').forEach(s => s.value = '');
        this.resultSection.classList.add('hidden');
        document.querySelector('.card').style.display = 'block';
        this.goToStep(1);
    }
}
